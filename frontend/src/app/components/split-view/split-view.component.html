<div class="h-[calc(100vh-64px)] flex flex-col">
  <!-- Header with State Filter -->
  <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold text-gray-900">Properties</h1>
    <div class="flex items-center gap-4">
      <select [(ngModel)]="selectedState" (change)="onStateChange()" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:outline-none bg-white">
        <option value="">All States</option>
        <option *ngFor="let state of availableStates" [value]="state">{{ state }}</option>
      </select>
      <span class="text-sm text-gray-500">{{ filteredProperties.length }} properties</span>
    </div>
  </div>

  <!-- Split View Content -->
  <div class="flex-1 flex overflow-hidden">
    <!-- Left: Map -->
    <div class="w-1/2 h-full">
      <div #mapContainer class="w-full h-full"></div>
    </div>

    <!-- Right: Property List -->
    <div class="w-1/2 h-full overflow-y-auto bg-gray-50">
      <!-- Skeleton Loading -->
      <div *ngIf="loading" class="p-4 space-y-4 h-full">
        <div *ngFor="let _ of [1,2,3,4,5]" class="bg-white rounded-xl shadow-sm overflow-hidden animate-pulse">
          <div class="flex">
            <div class="w-40 h-32 bg-gray-200 flex-shrink-0"></div>
            <div class="flex-1 p-4 space-y-3">
              <div class="h-5 bg-gray-200 rounded w-3/4"></div>
              <div class="h-4 bg-gray-200 rounded w-1/3"></div>
              <div class="h-4 bg-gray-200 rounded w-1/2"></div>
              <div class="flex justify-between mt-2">
                <div class="h-4 bg-gray-200 rounded w-1/4"></div>
                <div class="h-8 w-24 bg-gray-200 rounded"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Error -->
      <div *ngIf="error" class="flex items-center justify-center h-full text-red-500">{{ error }}</div>

      <!-- Empty -->
      <div *ngIf="!loading && !error && filteredProperties.length === 0" class="flex flex-col items-center justify-center h-full text-gray-500">
        <svg class="w-16 h-16 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
        <p>No properties found in this region.</p>
      </div>

      <!-- Property List -->
      <div *ngIf="!loading && !error" class="p-4 space-y-4">
        <div *ngFor="let property of displayedProperties" class="bg-white rounded-xl shadow-sm hover:shadow-md transition-all cursor-pointer border-2 text-black-900" [class.border-blue-500]="hoveredPropertyId === property._id" [class.border-transparent]="hoveredPropertyId !== property._id">
          <div class="flex">
            <!-- Image - Hover here shows title on image and opens map tooltip -->
            <div class="w-40 h-32 flex-shrink-0 relative group" (mouseenter)="onPropertyHover(property)" (mouseleave)="onPropertyLeave()">
              <img [src]="property.imageUrl" alt="{{ property.title }}" class="w-full h-full object-cover rounded-l-xl" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27160%27 height=%27128%27%3E%3Crect width=%27100%25%27 height=%27100%25%27 fill=%27%23f3f4f6%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 dominant-baseline=%27middle%27 text-anchor=%27middle%27 font-family=%27sans-serif%27 font-size=%2714%27 fill=%27%239ca3af%27%3ENo Image%3C/text%3E%3C/svg%3E'" />
              <span class="absolute top-2 left-2 px-2 py-1 rounded-full text-xs font-semibold text-white" [class.bg-green-500]="property.type === 'Rent'" [class.bg-red-500]="property.type === 'Sale'">{{ property.type }}</span>
              <!-- Hover Overlay with Title -->
              <div class="absolute inset-0 bg-black bg-opacity-70 rounded-l-xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                <p class="text-white font-semibold text-sm text-center px-2 line-clamp-2">{{ property.title }}</p>
              </div>
            </div>

            <!-- Info -->
            <div class="flex-1 p-4 flex flex-col justify-between">
              <div>
                <h3 class="font-bold text-gray-900 line-clamp-1">{{ property.title }}</h3>
                <p class="text-blue-600 font-semibold text-lg mt-1">{{ formatPrice(property.price, property.type) }}</p>
                <p class="text-gray-500 text-sm flex items-center gap-1 mt-1">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  </svg>
                  {{ property.location }}
                </p>
              </div>

              <div class="flex items-center justify-between mt-3">
                <div class="flex items-center gap-3 text-sm text-gray-500">
                  <span>{{ property.bedrooms }} BHK</span>
                  <span class="text-gray-300">|</span>
                  <span>{{ property.area }} sqft</span>
                </div>
                <button [routerLink]="['/property', property._id]" class="text-white bg-secondary hover:bg-secondary-hover font-medium text-sm flex items-center gap-1 px-2 py-1 rounded-lg transition-colors transform hover:scale-105">
                <!-- <a [routerLink]="['/property', property._id]" class="text-blue-600 hover:text-blue-700 font-medium text-sm flex items-center gap-1"> -->
                  View Details
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- View More Button -->
        <div *ngIf="hasMoreProperties" class="text-center pb-4">
          <button class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors font-medium" (click)="loadMoreProperties()">
            View More Properties
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
